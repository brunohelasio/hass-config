                      @keyframes wobble {
                        0% { transform: translateX(0%); }
                        15% { transform: translateX(-25%) rotate(-5deg); }
                        30% { transform: translateX(20%) rotate(3deg); }
                        45% { transform: translateX(-15%) rotate(-3deg); }
                        60% { transform: translateX(10%) rotate(2deg); }
                        75% { transform: translateX(-5%) rotate(-1deg); }
                        100% { transform: translateX(0%); }
                      }

                      .homepod {
                        animation: homepod 400ms infinite alternate ease-in-out;
                        transform-origin: center;
                      }

                      .wobble {
                        animation: wobble 2s ease infinite;
                      }
                    </style>
                      <g>
                        <path ${homepodFillColor} class="homepod" ${homepod} />
                        <path ${homepodMenuFillColor} ${homepodMenu} />
                        <path ${speakerFillColor}  ${speaker} />
                      </g>
                  </svg>
                `;
            if (variables.media_on)
                return `
                  <svg viewBox="0 0 50 50">
                    <path ${homepodFillColor} class="homepod" ${homepod} />
                    <path ${homepodMenuFillColor} ${homepodMenu} />
                    <path ${speakerFillColor}  ${speaker} />
                  </svg>
                `;
            return `
              <svg viewBox="0 0 50 50">
                <path fill="#9da0a2" ${homepod} />
                <path ${homepodMenuFillColor} ${homepodMenu} />
                <path fill="#9da0a2" ${speaker} />
              </svg>
            `;
        ]]]

