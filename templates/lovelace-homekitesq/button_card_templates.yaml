          if (variables.state_on && variables.timeout > 50000) {
              state = 'on_timeout';
          }
          let style =
              `
              <style>
                @keyframes on {
                  from {
                    transform: scaleY(0);
                  }
                  to {
                    transform: scaleY(1);
                  }
                }
