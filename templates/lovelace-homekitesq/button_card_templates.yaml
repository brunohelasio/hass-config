  icon_home:
    state_display: Auto
    styles:
      card:
        - transition: all 0.3s ease-out
      custom_fields:
        icon:
          - width: 72%
          - margin-left: -1%
          - fill: >
              [[[ return variables.state_on ? '#c7983e' : '#9da0a2'; ]]]
