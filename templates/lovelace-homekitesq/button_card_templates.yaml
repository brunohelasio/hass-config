    styles:
      custom_fields:
        icon:
          - width: 80%
          - margin-left: -8%
          - margin-top: -9%
    custom_fields:
      icon: >
        [[[
          let center = `
            <path d="M31.8,23.1c3.8,3.8,3.8,9.8,0,13.6c-3.8,3.8-9.8,3.8-13.6,0L31.8,23.1"/>
