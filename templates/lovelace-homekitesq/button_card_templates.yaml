    styles:
      custom_fields:
        icon:
          - top: -9%
          - width: 5%
          - height: 15%
          - position: absolute
          - fill: '#dedede'
    custom_fields:
      icon: >
        [[[
          let style = `
            <style>
              .scale-up {
                animation: scale-up 2s forwards;
                cubic-bezier(.05, .5, .3, 1);
                transform-origin: center center;
              }
              @keyframes scale-up {
                0% {
                  opacity: 0;
                  transform: scale(0);
                }
                20% {
                  transform: scale(1);
                }
                30% {
                  opacity: 1;
                }
                80% {
                  opacity: 1;
                }
                100% {
                  opacity: 0;
                }
              }
            </style>
          `,
              paused = `
            <style>
              .scale-up {
                animation: scale-up 2s forwards;
                cubic-bezier(.05, .5, .3, 1);
                transform-origin: center center;
              }
              @keyframes scale-up {
                0% {
                  opacity: 0;
                  transform: scale(0);
                }
                20% {
                  transform: scale(1);
                }
                30% {
                  opacity: 1;
                }
                80% {
                  opacity: 1;
                }
                100% {
                  opacity: 0.5;
                }
              }
            </style>
          `;
          if (variables.state === 'idle')
              return `
                <svg viewBox="0 0 166 166">${paused}
                    <path class="scale-up" d="M0 0h59.9v166H0zm106.1 0H166v166h-59.9z"/>
                </svg>
              `;
          if (variables.state === 'streaming' && variables.timeout < 50000)
              return `
                <svg viewBox="0 0 166 166">${style}
                    <path class="scale-up" d="M0 0l166 83L0 166z"/>
                </svg>
            `;
        ]]]

