action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Quarto Miguel
    style: >
      --popup-background-color: transparent;
    content:
      type: custom:mod-card
      card_mod:
        style:
          layout-card:
            $grid-layout:
              $:
                .: |
                  #root {
                    margin: 15px !important;
                  }

      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 21vw
          #grid-template-rows: 20vw 20vw
          grid-template-areas: |
            "quarto_miguel quarto_miguel quarto_miguel"
          mediaquery:
            #phone
            "(max-width: 800px)":
              grid-template-columns: 20px 80vw 10px
              #grid-template-rows: 1fr
              grid-template-areas: |
                ". quarto_miguel ."
            #tablet
            "(max-width: 2000px)":
              grid-template-columns: 21vw
              #grid-template-rows: 1fr
              grid-template-areas: |
                "quarto_miguel quarto_miguel quarto_miguel"

        cards:

          #################################################
          #                                               #
          #                QUARTO MIGUEL                  #
          #                                               #
          #################################################

          - type: grid
            #title: Quarto Miguel
            view_layout:
              grid-area: quarto_miguel
            cards:

