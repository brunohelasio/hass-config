# NOVA VERSÃO — Migrada do hass-config_negocjohn: 2 colunas (botoes + camera)
action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Office
    tag: office_popup
    size: wide
    style: >
      --popup-width: 65vw;
      --popup-max-width: 980px;
      --popup-background-color: rgba(15, 20, 35, 0.75);
      --mdc-theme-surface: rgba(20, 24, 33, 0.88);
      --mdc-dialog-scrim-color: rgba(0, 0, 0, 0.56);
      --dialog-box-shadow: 0 0 24px rgba(62, 132, 255, 0.22), 0 0 70px rgba(62, 132, 255, 0.14);
      --tablet-popup-content-padding: 0.4em 0.6em 0.6em 0.5em;
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 1.4fr 1.0fr
        grid-template-areas: '"col_buttons col_camera"'
        grid-gap: 10px
        margin: 0
        padding: 0.5rem
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: 1fr
            grid-template-areas: |
              "col_buttons"
              "col_camera"
            padding: 0
      cards:

        # ── Coluna 1: Botões (luzes + mídia + clima) ──
        - type: vertical-stack
          view_layout:
            grid-area: col_buttons
          cards:

            # Seção Luzes
            - type: custom:button-card
              entity: light.grupo_luzes_office
              triggers_update:
                - light.grupo_luzes_office
              name: Luzes
              show_state: false
              show_icon: false
              tap_action:
                action: toggle
                haptic: success
              custom_fields:
                on_off: |
                  <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
              state:
                - value: 'on'
                  custom_fields:
                    on_off: |
                      <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:#fff;background:#3b82f6;padding:1px 6px;border-radius:8px;margin-right:4px">ON</span>
                  styles:
                    icon:
                      - color: '#f0c040'
                - value: 'off'
                  custom_fields:
                    on_off: |
                      <span style="font-size:9px;font-weight:600;letter-spacing:0.5px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:8px;margin-right:4px">OFF</span>
                  styles:
                    icon:
                      - color: 'rgba(255,255,255,0.25)'
              styles:
                card:
                  - background: none
                  - box-shadow: none
                  - border: none
                  - padding: 0 4px
                  - height: 30px
                  - min-height: 30px
                grid:
                  - grid-template-areas: '"n on_off i"'
                  - grid-template-columns: 1fr auto auto
                name:
                  - font-size: 11px
                  - color: rgba(255,255,255,0.5)
                  - text-transform: uppercase
                  - letter-spacing: 1.5px
                  - justify-self: start
                  - font-weight: 500
                custom_fields:
                  on_off:
                    - justify-self: end
                    - align-self: center
                img_cell:
                  - justify-self: end
                  - width: 24px
                icon:
                  - width: 24px
                  - color: 'rgba(255,255,255,0.25)'
              card_mod:
                style: |
                  ha-card::before {
                    content: none !important;
                  }

            # Linha 1: 3 luzes + 2 blanks
            - type: grid
              columns: 5
              square: false
              card_mod:
                style: |
                  #root {
                    gap: 4px !important;
                    grid-template-columns: repeat(5, 98px) !important;
                  }
              cards:
                - type: custom:button-card
                  entity: light.office_switch_1
                  name: "OF - Luz estante"
                  template:
                    - tpl_popup_light
                    - icon_light_flush
                  tap_action:
                    action: toggle
                    haptic: success
                - type: custom:button-card
                  entity: light.office_switch_3
                  name: "OF - Luz central"
                  template:
                    - tpl_popup_light
                    - icon_light_recessed
                  tap_action:
                    action: toggle
                    haptic: success
                - type: custom:button-card
                  entity: light.office_switch_2
                  name: "OF - Luz ambiente"
                  template:
                    - tpl_popup_light
                    - icon_ledstrip
                  tap_action:
                    action: toggle
                    haptic: success
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - background: none
                      - border: none
                      - box-shadow: none
                      - opacity: '0'
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - background: none
                      - border: none
                      - box-shadow: none
                      - opacity: '0'

            # Divisor
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 2px
                  - margin: 4px 8px
                  - background: >-
                      linear-gradient(90deg,
                      rgba(255,255,255,0) 0%,
                      rgba(255,255,255,0.12) 15%,
                      rgba(255,255,255,0.20) 50%,
                      rgba(255,255,255,0.12) 85%,
                      rgba(255,255,255,0) 100%)
                  - backdrop-filter: blur(8px)
                  - -webkit-backdrop-filter: blur(8px)
                  - border: none
                  - box-shadow: none
                  - border-radius: 2px
                  - padding: 0
                  - min-height: auto
              card_mod:
                style: |
                  ha-card::before {
                    content: none !important;
                  }

            # Seção Mídia & Clima
            - type: custom:button-card
              name: "Mídia & Clima"
              show_state: false
              show_icon: false
              tap_action:
                action: none
              styles:
                card:
                  - background: none
                  - box-shadow: none
                  - border: none
                  - padding: 0 4px
                  - height: 30px
                  - min-height: 30px
                grid:
                  - grid-template-areas: '"n"'
                  - grid-template-columns: 1fr
                name:
                  - font-size: 11px
                  - color: rgba(255,255,255,0.5)
                  - text-transform: uppercase
                  - letter-spacing: 1.5px
                  - justify-self: start
                  - font-weight: 500
              card_mod:
                style: |
                  ha-card::before {
                    content: none !important;
                  }

            # Linha 2: Spotify + AC + MacBook + 2 blanks
            - type: grid
              columns: 5
              square: false
              card_mod:
                style: |
                  #root {
                    gap: 4px !important;
                    grid-template-columns: repeat(5, 98px) !important;
                  }
              cards:
                - type: custom:button-card
                  entity: media_player.spotifyplus_bruno_helasio
                  name: Spotify
                  template:
                    - base
                    - circle
                    - loader
                    - icon_spotify_color
                  state_display: >
                    [[[
                      return entity && entity.state === 'off' ? ' ' : null;
                    ]]]
                  variables:
                    state_on: >
                      [[[ return entity && ['on', 'idle', 'playing', 'paused', 'standby'].indexOf(entity.state) !== -1; ]]]
                    circle_input: >
                      [[[
                        if (entity && entity.attributes.volume_level !== undefined) {
                          let volume = Math.round(entity.attributes.volume_level * 100)
                          return volume === 0 && entity.state !== 'off' ? 1 : volume
                        }
                      ]]]
                    circle_input_unit: '%'
                  tap_action:
                    action: perform-action
                    perform_action: spotifyplus.player_transfer_playback
                    data:
                      entity_id: media_player.spotifyplus_bruno_helasio
                      device_name: "Echo Dot Office"
                      play: true
                      force_activate_device: true
                    haptic: success
                  double_tap_action:
                    action: more-info
                  hold_action:
                    action: more-info
                - type: custom:button-card
                  entity: climate.ac_office
                  name: Ar Cond.
                  template:
                    - tpl_popup_climate
                    - icon_climate
                  show_icon: false
                  tap_action:
                    action: perform-action
                    perform_action: climate.toggle
                    target:
                      entity_id: climate.ac_office
                    haptic: success
                  double_tap_action:
                    action: more-info
                  hold_action:
                    action: more-info
                - type: custom:button-card
                  name: MacBook
                  template:
                    - base
                  show_icon: false
                  tap_action:
                    action: none
                  styles:
                    card:
                      - opacity: "0.45"
                      - cursor: "default"
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - background: none
                      - border: none
                      - box-shadow: none
                      - opacity: '0'
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - background: none
                      - border: none
                      - box-shadow: none
                      - opacity: '0'

        # ── Coluna 2: Câmera ──
        - type: custom:layout-card
          layout_type: custom:grid-layout
          view_layout:
            grid-area: col_camera
          layout:
            grid-template-columns: 1fr
            margin: 0
          cards:
            - type: custom:button-card
              entity: camera.of_camera_2
              name: OF - Câmera
              template:
                - camera
                - icon_unifi_cam
