          # [BRUNO] Luzes do ambiente real (expand evita erro se alguma entidade não existir)
          {%- set lights = expand(
            'light.sala_switch_1',
            'light.sala_switch_2',
            'light.sala_switch_3',
            'light.sala_2_switch_2',
            'light.sala_2_switch_3',
            'light.varanda_switch_1',
            'light.varanda_switch_2',
            'light.cozinha_switch_1',
